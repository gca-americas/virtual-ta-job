steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    secretEnv: ['DB_CREDS']
    env:
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
    args:
      - '-ce'
      - |
        eval "$$DB_CREDS"
        apt-get update && apt-get install -y jq python3-pip git
        echo "Extracting Pub/Sub payload natively..."
        echo "DEBUG: Native Payload (_BODY) = '$_BODY'"

        EVENT_ID=$$(echo '$_BODY' | jq -r .event_id)
        SERVICE_NAME=$$(echo '$_BODY' | jq -r .service_name)

        echo "Setting up application for Event $$EVENT_ID..."

        # Clone the base virtual-ta application
        git clone https://github.com/gca-americas/virtual-ta.git app-workspace
        cd app-workspace
        mkdir -p backend/skills

        echo "Processing repositories..."
        echo '$_BODY' | jq -c '.repos[]' | while read -r repoObj; do
            URL=$$(echo $$repoObj | jq -r .url)
            PATHS=$$(echo $$repoObj | jq -r '.paths[]')

            echo "Cloning $$URL with sparse paths: $$PATHS"
            TEMP_DIR=$$(mktemp -d)
            git clone --depth 1 --no-checkout "$$URL" "$$TEMP_DIR"
            cd "$$TEMP_DIR"
            git sparse-checkout init --cone
            git sparse-checkout set $$PATHS
            git checkout
            for p in $$PATHS; do
                [ -d "$$p" ] && cp -r "$$p" "/workspace/app-workspace/backend/skills/" || true
            done
            cd -
            rm -rf "$$TEMP_DIR"
        done

        # Deploy to Cloud Run
        echo "Deploying to Cloud Run: $$SERVICE_NAME"
        gcloud run deploy $$SERVICE_NAME --source . --region us-central1 --allow-unauthenticated --set-env-vars="GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=$_GOOGLE_CLOUD_LOCATION,GOOGLE_GENAI_USE_VERTEXAI=$_GOOGLE_GENAI_USE_VERTEXAI,EVENT_ID=$$EVENT_ID,FIRESTORE_DATABASE_ID=$_FIRESTORE_DATABASE_ID" --format="value(status.url)" > /tmp/url.txt
        CLOUD_RUN_URL=$$(cat /tmp/url.txt)
        echo "Deployed to: $$CLOUD_RUN_URL"

        # Update the running_logs DB record
        cd /workspace
        git clone https://github.com/gca-americas/virtual-ta-job.git job-workspace
        cp job-workspace/database.py .

        pip3 install --break-system-packages pg8000 google-cloud-secret-manager "cloud-sql-python-connector[pg8000]"

        python3 << PYEOF
        import os
        from database import get_db_connection
        event_id = "$$EVENT_ID"
        url = open("/tmp/url.txt").read().strip()
        conn = get_db_connection()
        cur = conn.cursor()
        cur.execute("UPDATE running_logs SET status='RUNNING', cloud_run_url=%s, actual_datetime_started=CURRENT_TIMESTAMP WHERE event_id=%s", (url, event_id))
        conn.commit()
        conn.close()
        print(f"DB updated for {event_id}")
        PYEOF
substitutions:
  _GOOGLE_CLOUD_LOCATION: 'us-central1'
  _GOOGLE_GENAI_USE_VERTEXAI: 'True'
  _FIRESTORE_DATABASE_ID: 'virtual-ta-interaction'
availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/events-db-credentials/versions/latest
    env: 'DB_CREDS'
options:
  logging: CLOUD_LOGGING_ONLY
