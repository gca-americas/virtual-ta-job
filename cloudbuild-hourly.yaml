steps:
  - name: 'python:3.10'
    entrypoint: 'bash'
    secretEnv: ['DB_CREDS']
    env:
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
    args:
      - '-c'
      - |
        eval "$$DB_CREDS"
        cp ./hourly_job.py . || true
        cp ./database.py . || true

        pip install pg8000 google-cloud-pubsub google-cloud-secret-manager "cloud-sql-python-connector[pg8000]"
        python hourly_job.py
availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/events-db-credentials/versions/latest
    env: 'DB_CREDS'
options:
  logging: CLOUD_LOGGING_ONLY
