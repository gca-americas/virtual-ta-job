steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    secretEnv: ['DB_CREDS']
    env:
      - 'GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
    args:
      - '-c'
      - |
        eval "$$DB_CREDS"
        apt-get update && apt-get install -y jq
        echo "Extracting Pub/Sub payload natively..."
        echo "DEBUG: Native Payload (_BODY) = '$_BODY'"
        
        EVENT_ID=$$(echo '$_BODY' | jq -r .event_id)
        SERVICE_NAME=$$(echo '$_BODY' | jq -r .service_name)
        
        echo "Demolishing Cloud Run Service: $$SERVICE_NAME"
        gcloud run services delete $$SERVICE_NAME --region us-central1 --quiet || true
        
        # Pull the native database mapping definition dynamically!
        git clone https://github.com/gca-americas/virtual-ta-job.git job-workspace
        cp job-workspace/database.py . || true

        # Report completion directly to the postgres database
        apt-get install -y python3-pip
        pip3 install --break-system-packages pg8000 google-cloud-secret-manager "cloud-sql-python-connector[pg8000]" python-dotenv
        
        cat << 'EOF' > delete_db.py
        import sys
        from database import get_db_connection
        event_id = sys.argv[1]
        
        conn = get_db_connection()
        cur = conn.cursor()
        cur.execute("UPDATE running_logs SET status='DEMOLISHED', actual_datetime_ended=CURRENT_TIMESTAMP WHERE event_id=%s", (event_id,))
        conn.commit()
        conn.close()
        EOF
        
        python3 delete_db.py $$EVENT_ID
availableSecrets:
  secretManager:
  - versionName: projects/$PROJECT_ID/secrets/events-db-credentials/versions/latest
    env: 'DB_CREDS'
options:
  logging: CLOUD_LOGGING_ONLY
