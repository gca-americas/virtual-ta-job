steps:
  - name: 'python:3.10'
    entrypoint: 'bash'
    env:
      - 'CLOUD_SQL_CONNECTION_NAME=pokedemo-test:us-central1:events-db-instance'
      - 'DB_USER=admin'
      - 'DB_PASS=1234qwer'
      - 'DB_NAME=events_db'
    args:
      - '-c'
      - |
        pip install pg8000 "cloud-sql-python-connector[pg8000]"
        python -c "
        import os
        from google.cloud.sql.connector import Connector, IPTypes
        import pg8000
        connector = Connector()
        conn = connector.connect(os.environ['CLOUD_SQL_CONNECTION_NAME'], 'pg8000', user=os.environ['DB_USER'], password=os.environ['DB_PASS'], db=os.environ['DB_NAME'], ip_type=IPTypes.PUBLIC)
        cur = conn.cursor()
        cur.execute('DELETE FROM running_logs;')
        conn.commit()
        conn.close()
        print('SUCCESSFULLY CLEARED running_logs STATE.')
        "
